# SQL Server 2022 cho môi trường phát triển.
#   - macOS: chạy qua OrbStack (hoặc Docker Desktop)
#   - Windows: chạy y hệt qua Docker Desktop (hoặc dùng SQL Server native, xem README)
# Trên Apple Silicon (arm64), image chạy dưới giả lập amd64 (đã pin platform).
# Mật khẩu SA dưới đây CHỈ dùng cho DEV cục bộ; có thể override bằng biến
# môi trường MSSQL_SA_PASSWORD. Không dùng cho production.
services:
  sqlserver:
    image: mcr.microsoft.com/mssql/server:2022-latest
    platform: linux/amd64
    container_name: cookingadvisor-sqlserver
    environment:
      ACCEPT_EULA: "Y"
      MSSQL_SA_PASSWORD: "${MSSQL_SA_PASSWORD:-CookAdvisor@2026}"
      MSSQL_PID: "Developer"
    ports:
      - "1433:1433"
    volumes:
      - cookingadvisor-mssql-data:/var/opt/mssql
    restart: unless-stopped

volumes:
  cookingadvisor-mssql-data:
